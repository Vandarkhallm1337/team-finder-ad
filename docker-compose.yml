services:

  web:

    build: .

    container_name: teamfinder_web

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

    restart: always


  db:

    image: postgres:16

    env_file:
      - .env

    container_name: teamfinder_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always


volumes:
  postgres_data: